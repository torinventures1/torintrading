version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: torin-postgres
    environment:
      POSTGRES_USER: torin
      POSTGRES_PASSWORD: torin123
      POSTGRES_DB: torintrading
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
